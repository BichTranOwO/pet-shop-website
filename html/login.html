<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhâp tài khoản</title>
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.css">
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/web/login.css">
</head>

<body>
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
      
        <div class="auth-card row">
            <div class="col-md-6 auth-card__image-container p-0">
                <img src="/assets/images/dannhap.jpg" alt="Đăng nhập" class="auth-card__image">
            </div>
            <div class="col-md-6 auth-card__form d-flex flex-column justify-content-center">
                <h2 class="auth-card__title mb-4">Đăng nhập tài khoản</h2>
                <form action="/register" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <span class="text-danger">*</span>
                        <input type="email" class="form-control" id="email" name="email" placeholder="abc@gmail.com"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <span class="text-danger">*</span>

                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn w-100 mt-3" id="btnDangNhap">Đăng nhập</button>
                </form>
                <p class="mt-3 text-center">
                    Bạn chưa có tài khoản? <a class="text-dark" href="/html/register.html">Đăng ký</a>
                </p>
            </div>

        </div>
    </div>
    <script src="/js/bootstrap/bootstrap.bundle.js"></script>

</body>

</html>
