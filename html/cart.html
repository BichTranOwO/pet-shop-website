<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIỎ HÀNG</title>
    <link rel="stylesheet" href="../css/web/component.css">
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.css">
    <link rel="stylesheet" href="../css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../css/web/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="../js/web/jquery-4.0.0.js"></script>
</head>

<body style="background-color:var(--bg-main);">

    <div id="header"></div>

    <main class="container py-5" style="margin-top:120px ;">

        <h3 class="cart-title fw-bold mb-4">GIỎ HÀNG CỦA BẠN</h3>

        <div class="row">

            <!-- LEFT: CART LIST -->
            <div class="col-md-8">

                <div class="cart-container" id="cart-list">
                    <!-- JS render vào đây -->
                </div>

                <a href="/index.html" class="btn mt-3" id="btnTroVe">
                    Tiếp tục mua sắm
                </a>
            </div>

            <!-- RIGHT: SUMMARY -->
            <div class="col-md-4">
                <div class="summary-box">
                    <h5 class="fw-bold">TỔNG TIỀN</h5>
                    <hr>

                    <p>Tạm tính: <span id="subtotal">0đ</span></p>
                    <p>Giảm giá: <span>0đ</span></p>

                    <hr>
                    <h5>Tổng cộng: <span id="total">0đ</span></h5>

                    <button type="button" class="btn mt-3 py-2" id="btnTienHanhThanhToan">MUA NGAY
                    </button>
                </div>
            </div>

        </div>

    </main>
    <div id="footer" class="mt-5"></div>
    <script src="../js/bootstrap/bootstrap.bundle.js"></script>
    <script src="../js/web/loadComponent.js"></script>
    <script src="../js/web/product-pagination.js"></script>
    <script src="../js/web/product-filter-dog.js"></script>
    <script src="../js/web/cart.js"></script>
    <script src="../js/web/add-to-cart.js"></script>
</body>

</html>
